services:
  postgres:
    build: ./docker/postgres
    command: ["postgres", "-c", "work_mem=64MB"]
    environment:
      POSTGRES_DB: fpgwiki
      POSTGRES_USER: fpgwiki
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fpgwiki_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fpgwiki -d fpgwiki"]
      interval: 5s
      retries: 20

  backend:
    build: ./backend
    environment:
      POSTGRES_DSN: postgres://fpgwiki:${POSTGRES_PASSWORD:-fpgwiki_dev}@postgres:5432/fpgwiki?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      UPLOAD_DIR: /data/uploads
      APP_ENV: dev
    volumes:
      - uploads:/data/uploads
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE: http://backend:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads:
